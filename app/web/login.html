<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NTP Extender — Вход</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: rgba(255, 255, 255, 0.07);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.65);
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 600px at 25% 10%, rgba(96,165,250,0.25), transparent), var(--bg);
    }
    .card {
      width: min(420px, 92vw);
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 18px;
    }
    h1 { margin: 0 0 8px 0; font-size: 20px; }
    .muted { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.2);
      color: var(--text);
      outline: none;
    }
    .password-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .password-wrap input {
      margin-bottom: 0;
      flex: 1;
    }
    .toggle-pass {
      width: 44px;
      min-width: 44px;
      padding: 10px 0;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      cursor: pointer;
      line-height: 1;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(96,165,250,0.4);
      background: rgba(96,165,250,0.28);
      color: var(--text);
      cursor: pointer;
    }
    .msg { margin-top: 10px; color: var(--muted); font-size: 13px; min-height: 18px; }
    code { color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>NTP Extender</h1>
    <div class="muted">Вход в интерфейс управления</div>
    <input id="username" type="text" placeholder="Логин" value="admin" />
    <div class="password-wrap">
      <input id="password" type="password" placeholder="Пароль" />
      <button id="togglePasswordBtn" class="toggle-pass" type="button" title="Показать/скрыть пароль">👁</button>
    </div>
    <button id="loginBtn" type="button">Войти</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const el = (id) => document.getElementById(id);
    function setMsg(text) { el("msg").textContent = text || ""; }

    async function login() {
      const username = (el("username").value || "").trim();
      const password = el("password").value || "";
      if (!username) {
        setMsg("Введите логин.");
        return;
      }
      setMsg("Проверяем...");
      const r = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ username, password })
      });
      const data = await r.json();
      if (!data.ok) {
        setMsg("Ошибка входа: " + (data.detail || "неизвестно"));
        return;
      }
      window.location.href = "/";
    }

    el("loginBtn").addEventListener("click", login);
    el("togglePasswordBtn").addEventListener("click", () => {
      const p = el("password");
      p.type = p.type === "password" ? "text" : "password";
    });
    el("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
